<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>减肥记录助手 SPA</title>
  
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf',
              500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* 安全区适配 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    /* 隐藏滚动条但保留功能 */
    ::-webkit-scrollbar { display: none; }
    
    /* 简单的入场动画 */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in-up { animation: fade-in-up 0.3s ease-out forwards; }
    
    @keyframes zoom-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-zoom { animation: zoom-in 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-200 antialiased text-gray-800">

<!-- App 主容器 -->
<div id="app" class="min-h-screen bg-gray-50 font-sans mx-auto max-w-md relative pb-16 shadow-xl shadow-gray-200/50 sm:border-x border-gray-100 overflow-x-hidden">
  
  <!-- 全局 Toast 提示 -->
  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 opacity-0 pointer-events-none transform -translate-y-4">
    <div id="toast-content" class="flex items-center gap-2 px-4 py-3 rounded-full shadow-lg text-sm font-medium bg-teal-50 text-teal-700 border border-teal-200">
      <!-- Icon injected by JS -->
      <span id="toast-text">提示信息</span>
    </div>
  </div>

  <!-- 全局 Confirm 弹窗 -->
  <div id="confirm-dialog" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-zoom">
      <div class="p-6">
        <h3 id="confirm-title" class="text-xl font-bold text-gray-800 mb-2">提示</h3>
        <p id="confirm-msg" class="text-gray-600">内容</p>
      </div>
      <div class="flex border-t border-gray-100 bg-gray-50/50">
        <button id="btn-confirm-cancel" class="flex-1 py-4 text-gray-600 font-medium hover:bg-gray-100 transition-colors">取消</button>
        <div class="w-px bg-gray-200"></div>
        <button id="btn-confirm-ok" class="flex-1 py-4 text-red-600 font-bold hover:bg-red-50 transition-colors">确认</button>
      </div>
    </div>
  </div>

  <!-- 主体视图区域 -->
  <main class="min-h-screen">
    
    <!-- 1. 首页视图 (Home) -->
    <div id="view-home" class="p-4 pb-24 animate-in-up">
      <h2 class="text-2xl font-bold text-teal-700 mb-6 flex items-center gap-2">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-500"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        今日记录
      </h2>
      
      <!-- 体重录入 -->
      <div class="bg-white rounded-2xl p-5 shadow-sm mb-6 flex items-center gap-4 border border-gray-50">
        <div class="bg-teal-50 p-3 rounded-full text-teal-600">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        </div>
        <div class="flex-1 flex items-center bg-gray-50 rounded-lg overflow-hidden border border-gray-200 focus-within:border-teal-400 focus-within:ring-1 focus-within:ring-teal-400 transition-all">
          <input type="number" id="input-weight" placeholder="输入体重(kg)" class="w-full bg-transparent px-3 py-2.5 outline-none text-gray-700 font-medium">
          <button id="btn-save-weight" class="bg-teal-600 text-white px-5 py-2.5 font-medium hover:bg-teal-700 active:bg-teal-800 transition-colors h-full">保存</button>
        </div>
      </div>

      <!-- 历史记录列表 -->
      <h3 class="text-lg font-bold text-gray-800 mb-4 px-1">近期动态</h3>
      <div id="history-list" class="space-y-3">
        <!-- JS 动态注入记录 -->
      </div>
      
      <!-- 无记录占位图 (默认隐藏) -->
      <div id="history-empty" class="hidden text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-50">
        <div class="bg-gray-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </div>
        <p class="text-gray-500 font-medium">暂无记录</p>
        <p class="text-sm text-gray-400 mt-1">快去录入你的第一条数据吧</p>
      </div>

      <!-- 悬浮打卡按钮（可拖动） -->
      <button id="btn-open-sport" class="fixed z-30 bg-gradient-to-br from-teal-400 to-teal-600 text-white rounded-full p-4 shadow-lg shadow-teal-600/30 flex items-center justify-center select-none touch-none active:scale-95" style="right: 16px; bottom: 80px;" aria-label="记录今日运动">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      </button>

    <!-- 2. 分析视图 (Analyze) -->
    <div id="view-analyze" class="hidden p-4 pb-24 animate-in-up">

         <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-500"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>

      </h2>
      
      <div id="chart-card" class="bg-white rounded-2xl p-5 shadow-sm mb-6 border border-gray-50">
        <h3 class="font-bold text-gray-800 mb-6 flex items-center gap-2">
          体重走势
          <span class="text-[10px] font-bold px-2 py-0.5 bg-teal-50 text-teal-600 rounded-full">最近记录</span>
        </h3>
        <div id="chart-container" class="h-56 w-full flex items-center justify-center -ml-2">
          <!-- SVG Chart generated by JS -->

      </div>

      <div id="chart-empty" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-50">
        <div class="bg-gray-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        </div>
        <p class="text-gray-500 font-medium">暂无图表数据</p>
        <p class="text-sm text-gray-400 mt-1">记录体重后即可查看趋势</p>
      </div>
    </div>

    <!-- 3. 我的视图 (Profile) -->
    <div id="view-profile" class="hidden p-4 pb-24 animate-in-up">
      <h2 class="text-2xl font-bold text-teal-700 mb-6 flex items-center gap-2">
         <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-500"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

      </h2>
      
      <!-- BMI 仪表盘 -->
      <div class="bg-white rounded-2xl p-6 shadow-sm mb-6 flex flex-col items-center border border-gray-50 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 via-green-400 to-red-400 opacity-50"></div>
        <h3 class="font-bold text-gray-800 self-start mb-4">BMI 仪表盘</h3>
        
        <div class="relative w-48 h-24 overflow-hidden mb-2">
          <!-- 仪表盘彩色环 -->
          <div class="w-48 h-48 rounded-full border-[16px] border-t-green-400 border-r-yellow-400 border-b-red-400 border-l-blue-400 rotate-[-45deg] opacity-20"></div>
          <div class="absolute top-[16px] left-[16px] w-[160px] h-[160px] bg-white rounded-full"></div>
          
          <div class="absolute bottom-0 left-1/2 -translate-x-1/2 flex flex-col items-center pb-2">
            <span id="bmi-val" class="text-4xl font-black tracking-tighter text-gray-800">--</span>
            <span id="bmi-status" class="text-sm font-bold mt-1 px-2.5 py-0.5 rounded-full bg-gray-50 text-gray-400">暂无数据</span>
          </div>
        </div>
        
        <div class="w-full flex justify-between text-[10px] font-medium text-gray-400 mt-2 px-2">
          <span>&lt;18.5 偏瘦</span>
          <span>18.5-24 正常</span>
          <span>&gt;24 偏胖</span>
        </div>
      </div>

      <!-- 基础设置 -->
      <h3 class="text-lg font-bold text-gray-800 mb-3 px-1">基础设置</h3>
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-8 border border-gray-50">
        <div class="flex items-center justify-between p-4 border-b border-gray-100 group focus-within:bg-gray-50 transition-colors">
           <span class="text-gray-700 font-medium">身高 (cm)</span>
           <input type="number" id="input-height" placeholder="用于计算BMI" class="text-right bg-transparent outline-none text-gray-800 font-bold w-32">
        </div>
        <div class="flex items-center justify-between p-4 group focus-within:bg-gray-50 transition-colors">
           <span class="text-gray-700 font-medium">目标体重 (kg)</span>
           <input type="number" id="input-target" placeholder="设定减重目标" class="text-right bg-transparent outline-none text-gray-800 font-bold w-32">
        </div>
      </div>

      <div class="px-1">
        <button id="btn-clear-data" class="w-full py-3.5 border-2 border-red-100 text-red-500 font-bold rounded-xl bg-white hover:bg-red-50 hover:border-red-200 transition-colors">
          清除本地所有数据
        </button>
      </div>
    </div>

  </main>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pb-safe z-40">
    <button data-tab="home" class="nav-btn flex flex-col items-center p-3 relative flex-1 touch-manipulation group text-teal-600">
      <div class="transition-all duration-300 transform -translate-y-1 icon-wrapper">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="text-[11px] font-bold mt-1 transition-all duration-300 opacity-100 text-label">首页</span>
      <div class="nav-indicator absolute top-1 right-1/4 w-1.5 h-1.5 bg-teal-500 rounded-full animate-zoom"></div>
    </button>
    
    <button data-tab="analyze" class="nav-btn flex flex-col items-center p-3 relative flex-1 touch-manipulation group text-gray-400 hover:text-gray-500">
      <div class="transition-all duration-300 icon-wrapper">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
      </div>
      <span class="text-[11px] font-bold mt-1 transition-all duration-300 opacity-0 absolute translate-y-2 text-label">分析</span>
      <div class="nav-indicator absolute top-1 right-1/4 w-1.5 h-1.5 bg-teal-500 rounded-full hidden"></div>
    </button>
    
    <button data-tab="profile" class="nav-btn flex flex-col items-center p-3 relative flex-1 touch-manipulation group text-gray-400 hover:text-gray-500">
      <div class="transition-all duration-300 icon-wrapper">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="text-[11px] font-bold mt-1 transition-all duration-300 opacity-0 absolute translate-y-2 text-label">我的</span>
      <div class="nav-indicator absolute top-1 right-1/4 w-1.5 h-1.5 bg-teal-500 rounded-full hidden"></div>
    </button>
  </nav>
  
  <!-- 运动打卡弹窗 Modal -->
  <div id="sport-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-zoom">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
           <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
             运动打卡
           </h3>
           <button id="btn-close-sport" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100 transition-colors">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
           </button>
        </div>
        
        <div class="mb-6">
          <p class="text-sm font-bold text-gray-700 mb-3">运动时长 (分钟)</p>
          <div class="flex flex-wrap gap-2 mb-3" id="duration-buttons">
            <!-- JS 注入预设时长按钮 -->
          </div>
          <div class="flex items-center gap-2 mt-2">
             <input type="number" id="input-custom-duration" placeholder="自定义分钟" class="w-full bg-gray-50 border border-gray-200 focus:border-teal-400 focus:bg-white rounded-lg px-3 py-2.5 text-sm font-medium outline-none transition-colors">
          </div>
        </div>

        <div class="mb-2">
          <p class="text-sm font-bold text-gray-700 mb-3">运动项目 (可多选)</p>
          <div class="flex flex-wrap gap-2" id="sport-type-buttons">
            <!-- JS 注入项目按钮 -->
          </div>
        </div>
      </div>
      
      <div class="flex border-t border-gray-100 bg-gray-50/50 p-4 gap-3">
        <button id="btn-cancel-sport" class="flex-1 py-3 text-gray-600 font-bold bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">取消</button>
        <button id="btn-submit-sport" class="flex-1 py-3 text-white font-bold bg-teal-600 rounded-xl shadow-md shadow-teal-600/20 hover:bg-teal-700 active:bg-teal-800 transition-colors">确认保存</button>
      </div>
    </div>
  </div>

</div>

<!-- 核心业务逻辑 -->
<script>
  /** --- 数据层 DB Service --- */
  const DB_KEY = 'diet_tracker_vanilla_v1';
  
  function initDB() {
    const stored = localStorage.getItem(DB_KEY);
    if (!stored) {
      const defaultDB = { user: { height: '', targetWeight: '' }, weights: [], sports: [] };
      localStorage.setItem(DB_KEY, JSON.stringify(defaultDB));
      return defaultDB;
    }
    return JSON.parse(stored);
  }

  const dbService = {
    get: () => initDB(),
    save: (data) => localStorage.setItem(DB_KEY, JSON.stringify(data)),
    addWeight: (val) => {
      const db = initDB();
      const now = new Date();
      const offsetDate = new Date(now.getTime() - (now.getTimezoneOffset() * 60000));
      db.weights.unshift({
        id: Date.now().toString(),
        value: parseFloat(val).toFixed(1),
        date: offsetDate.toISOString().split('T')[0],
        timestamp: now.getTime()
      });
      dbService.save(db);
    },
    addSport: (duration, types) => {
      const db = initDB();
      const now = new Date();
      const offsetDate = new Date(now.getTime() - (now.getTimezoneOffset() * 60000));
      db.sports.unshift({
        id: Date.now().toString(),
        duration: parseInt(duration),
        types: [...types],
        date: offsetDate.toISOString().split('T')[0],
        timestamp: now.getTime()
      });
      dbService.save(db);
    },
    deleteRecord: (type, id) => {
      const db = initDB();
      if (type === 'weight') db.weights = db.weights.filter(item => item.id !== id);
      else db.sports = db.sports.filter(item => item.id !== id);
      dbService.save(db);
    },
    updateUser: (key, val) => {
      const db = initDB();
      db.user[key] = val;
      dbService.save(db);
    },
    clearAll: () => {
      localStorage.removeItem(DB_KEY);
      initDB();
    }
  };

  /** --- 状态变量 --- */
  let activeTab = 'home';
  let sportDuration = '30';
  let sportTypes = [];
  
  // Icon Helpers
  const IconScale = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>`;
  const IconFlame = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`;
  const IconTrash = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`;
  const IconCheck = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  
  /** --- 全局 UI 组件 --- */
  function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    const content = document.getElementById('toast-content');
    const text = document.getElementById('toast-text');
    
    content.className = `flex items-center gap-2 px-4 py-3 rounded-full shadow-lg text-sm font-medium ${isError ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-teal-50 text-teal-700 border border-teal-200'}`;
    text.innerHTML = message;
    
    toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
    toast.classList.add('opacity-100', 'translate-y-0');
    
    setTimeout(() => {
      toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
      toast.classList.remove('opacity-100', 'translate-y-0');
    }, 2500);
  }

  let confirmCallback = null;
  function showConfirm(title, message, onConfirm) {
    document.getElementById('confirm-title').innerText = title;
    document.getElementById('confirm-msg').innerText = message;
    confirmCallback = onConfirm;
    document.getElementById('confirm-dialog').classList.remove('hidden');
  }
  function hideConfirm() {
    document.getElementById('confirm-dialog').classList.add('hidden');
    confirmCallback = null;
  }
  document.getElementById('btn-confirm-cancel').addEventListener('click', hideConfirm);
  document.getElementById('btn-confirm-ok').addEventListener('click', () => {
    if(confirmCallback) confirmCallback();
    hideConfirm();
  });

  /** --- 路由与视图控制 --- */
  const navBtns = document.querySelectorAll('.nav-btn');
  const views = {
    home: document.getElementById('view-home'),
    analyze: document.getElementById('view-analyze'),
    profile: document.getElementById('view-profile')
  };

  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      activeTab = target;
      
      // Update Tabs UI
      navBtns.forEach(b => {
        const isTarget = b.dataset.tab === target;
        b.className = `nav-btn flex flex-col items-center p-3 relative flex-1 touch-manipulation group transition-colors ${isTarget ? 'text-teal-600' : 'text-gray-400 hover:text-gray-500'}`;
        
        const wrapper = b.querySelector('.icon-wrapper');
        if(isTarget) wrapper.classList.add('-translate-y-1'); else wrapper.classList.remove('-translate-y-1');
        
        const label = b.querySelector('.text-label');
        if(isTarget) label.classList.replace('opacity-0', 'opacity-100'); else label.classList.replace('opacity-100', 'opacity-0');
        if(isTarget) label.classList.remove('translate-y-2', 'absolute'); else label.classList.add('translate-y-2', 'absolute');
        
        const indicator = b.querySelector('.nav-indicator');
        if(isTarget) indicator.classList.remove('hidden'); else indicator.classList.add('hidden');
      });

      // Update Views
      Object.keys(views).forEach(key => views[key].classList.add('hidden'));
      views[target].classList.remove('hidden');
      
      refreshUI();
    });
  });

  function refreshUI() {
    if (activeTab === 'home') renderHome();
    if (activeTab === 'analyze') renderAnalyze();
    if (activeTab === 'profile') renderProfile();
  }

  /** --- 首页逻辑 (Home) --- */
  function renderHome() {
    const db = dbService.get();
    const listContainer = document.getElementById('history-list');
    const emptyState = document.getElementById('history-empty');
    
    // Mix and sort data
    const mixed = [];
    db.weights.forEach(w => mixed.push({ ...w, type: 'weight', displayValue: `${w.value} kg` }));
    db.sports.forEach(s => mixed.push({ ...s, type: 'sport', displayValue: `${s.types.join(', ')} | ${s.duration}分` }));
    mixed.sort((a, b) => b.timestamp - a.timestamp);

    if (mixed.length === 0) {
      listContainer.innerHTML = '';
      emptyState.classList.remove('hidden');
    } else {
      emptyState.classList.add('hidden');
      listContainer.innerHTML = mixed.map(item => `
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-50 flex items-center justify-between group transition-all hover:shadow-md">
          <div class="flex items-center gap-3">
            <div class="p-2.5 rounded-full ${item.type === 'weight' ? 'bg-blue-50 text-blue-500' : 'bg-orange-50 text-orange-500'}">
              ${item.type === 'weight' ? IconScale : IconFlame}
            </div>
            <div>
              <p class="font-bold text-gray-800 text-base">${item.displayValue}</p>
              <p class="text-xs text-gray-400 font-medium mt-0.5">${item.date}</p>
            </div>
          </div>
          <button onclick="handleDelete('${item.type}', '${item.id}')" class="text-gray-300 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors active:scale-95">
            ${IconTrash}
          </button>
        </div>
      `).join('');
    }
  }

  document.getElementById('btn-save-weight').addEventListener('click', () => {
    const input = document.getElementById('input-weight');
    const val = input.value;
    if (!val || isNaN(val) || parseFloat(val) <= 0) {
      showToast('请输入有效的体重数值', true);
      return;
    }
    dbService.addWeight(val);
    input.value = '';
    showToast('记录成功');
    renderHome();
  });

  window.handleDelete = (type, id) => {
    showConfirm('确认删除', '删除后将无法恢复，是否继续？', () => {
      dbService.deleteRecord(type, id);
      showToast('删除成功');
      refreshUI();
    });
  };

  /** --- 运动弹窗逻辑 --- */
  const sportModal = document.getElementById('sport-modal');
  const customDurInput = document.getElementById('input-custom-duration');
  
  function openSportModal() {
    sportDuration = '30';
    sportTypes = [];
    customDurInput.value = '';
    customDurInput.classList.remove('border-teal-500', 'ring-1', 'ring-teal-500', 'bg-white');
    renderSportModalUI();
    sportModal.classList.remove('hidden');
  }
  function closeSportModal() { sportModal.classList.add('hidden'); }
  
  document.getElementById('btn-open-sport').addEventListener('click', () => {
    if (isFabDragging) return;
    openSportModal();
  });
  document.getElementById('btn-close-sport').addEventListener('click', closeSportModal);
  document.getElementById('btn-cancel-sport').addEventListener('click', closeSportModal);
  
  customDurInput.addEventListener('input', (e) => {
    sportDuration = ''; // clear preset if custom is typed
    if (e.target.value) {
      customDurInput.classList.add('border-teal-500', 'ring-1', 'ring-teal-500', 'bg-white');
    } else {
      customDurInput.classList.remove('border-teal-500', 'ring-1', 'ring-teal-500', 'bg-white');
    }
    renderSportModalUI(); // re-render presets to unselect
  });

  function renderSportModalUI() {
    // Render Durations
    const durContainer = document.getElementById('duration-buttons');
    const durations = ['10', '15', '30', '45'];
    durContainer.innerHTML = durations.map(d => {
      const isSelected = (sportDuration === d && !customDurInput.value);
      const classes = isSelected
        ? 'bg-teal-600 border-teal-600 text-white shadow-md shadow-teal-600/20'
        : 'bg-white border-gray-200 text-gray-600 hover:border-teal-300 hover:bg-teal-50';
      return `<button onclick="selectSportDuration('${d}')" class="px-4 py-2 rounded-full text-sm font-bold transition-all border ${classes}">${d}分</button>`;
    }).join('');

    // Render Types
    const typeContainer = document.getElementById('sport-type-buttons');
    const allTypes = ['壶铃', '力量训练', '跑步', '跳绳', '爬楼', '游泳', '有氧操'];
    typeContainer.innerHTML = allTypes.map(type => {
      const isSelected = sportTypes.includes(type);
      const classes = isSelected 
        ? 'bg-orange-50 border-orange-200 text-orange-600'
        : 'bg-white border-gray-200 text-gray-600 hover:border-orange-300 hover:bg-orange-50/50';
      const checkIcon = isSelected ? `<span class="text-orange-500">${IconCheck}</span>` : '';
      return `<button onclick="toggleSportType('${type}')" class="px-3 py-1.5 rounded-lg text-sm font-medium transition-all border flex items-center gap-1.5 ${classes}">${checkIcon}${type}</button>`;
    }).join('');
  }

  window.selectSportDuration = (d) => {
    sportDuration = d;
    customDurInput.value = '';
    customDurInput.classList.remove('border-teal-500', 'ring-1', 'ring-teal-500', 'bg-white');
    renderSportModalUI();
  };
  
  window.toggleSportType = (type) => {
    if(sportTypes.includes(type)) sportTypes = sportTypes.filter(t => t !== type);
    else sportTypes.push(type);
    renderSportModalUI();
  };

  document.getElementById('btn-submit-sport').addEventListener('click', () => {
    const finalDuration = customDurInput.value || sportDuration;
    if (!finalDuration || parseInt(finalDuration) <= 0) {
      showToast('请输入有效的运动时长', true); return;
    }
    if (sportTypes.length === 0) {
      showToast('请至少选择一项运动', true); return;
    }
    dbService.addSport(finalDuration, sportTypes);
    closeSportModal();
    showToast('打卡成功');
    renderHome();
  });


  /** --- 分析逻辑 (Analyze) --- */
  function renderAnalyze() {
    const db = dbService.get();
    const container = document.getElementById('chart-container');
    const emptyState = document.getElementById('chart-empty');
    const chartCard = document.getElementById('chart-card');
    
    if (db.weights.length === 0) {
      chartCard.classList.add('hidden');
      emptyState.classList.remove('hidden');
      return;
    }
    chartCard.classList.remove('hidden');
    emptyState.classList.add('hidden');

    const chartData = [...db.weights].sort((a, b) => a.timestamp - b.timestamp).map(w => ({
      date: w.date.substring(5),
      weight: parseFloat(w.value)
    }));

    const targetWeight = db.user.targetWeight ? parseFloat(db.user.targetWeight) : null;
    
    // Draw SVG
    const padding = 30;
    const width = 320;
    const height = 220;
    
    const weights = chartData.map(d => d.weight);
    const minW = Math.max(0, Math.floor(Math.min(...weights)) - 2);
    const maxW = Math.ceil(Math.max(...weights)) + 2;
    const range = maxW - minW || 1;

    const getX = (index) => padding + (index * (width - 2 * padding) / Math.max(chartData.length - 1, 1));
    const getY = (val) => height - padding - ((val - minW) / range * (height - 2 * padding));
    const points = chartData.map((d, i) => `${getX(i)},${getY(d.weight)}`).join(' ');

    let svgContent = `<svg viewBox="0 0 ${width} ${height}" class="w-full h-full overflow-visible text-xs font-sans">`;
    
    // Y Axis Grid
    [0, 0.25, 0.5, 0.75, 1].forEach(pct => {
      const y = padding + pct * (height - 2 * padding);
      const val = maxW - pct * range;
      svgContent += `
        <g>
          <line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#f1f5f9" stroke-width="1" />
          <text x="${padding - 5}" y="${y + 4}" fill="#cbd5e1" text-anchor="end" font-size="10">${val.toFixed(0)}</text>
        </g>
      `;
    });

    // Target Line
    if (targetWeight && targetWeight >= minW && targetWeight <= maxW) {
      const y = getY(targetWeight);
      svgContent += `
        <g>
          <line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#f43f5e" stroke-dasharray="4 4" stroke-width="1.5" />
          <text x="${width - padding}" y="${y - 6}" fill="#f43f5e" text-anchor="end" font-size="10" font-weight="bold">目标 ${targetWeight}kg</text>
        </g>
      `;
    }

    // Polyline Data Line
    svgContent += `<polyline fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${points}" />`;

    // Data Points
    chartData.forEach((d, i) => {
      const x = getX(i);
      const y = getY(d.weight);
      svgContent += `
        <g>
          <circle cx="${x}" cy="${y}" r="4.5" fill="#fff" stroke="#0d9488" stroke-width="2.5" />
          <text x="${x}" y="${y - 12}" fill="#0f766e" text-anchor="middle" font-weight="bold">${d.weight}</text>
      `;
      // Sparse X-axis labels
      if (i === 0 || i === chartData.length - 1 || chartData.length < 8 || i % Math.ceil(chartData.length/4) === 0) {
        svgContent += `<text x="${x}" y="${height - 5}" fill="#94a3b8" text-anchor="middle" font-size="10">${d.date}</text>`;
      }
      svgContent += `</g>`;
    });

    svgContent += `</svg>`;
    container.innerHTML = svgContent;
  }

  /** --- 个人中心逻辑 (Profile) --- */
  const heightInput = document.getElementById('input-height');
  const targetInput = document.getElementById('input-target');

  function renderProfile() {
    const db = dbService.get();
    heightInput.value = db.user.height || '';
    targetInput.value = db.user.targetWeight || '';
    
    // Update BMI
    const h = parseFloat(db.user.height);
    const bmiValEl = document.getElementById('bmi-val');
    const bmiStatusEl = document.getElementById('bmi-status');
    
    if (!h || db.weights.length === 0) {
      bmiValEl.innerText = '--';
      bmiValEl.className = 'text-4xl font-black tracking-tighter text-gray-800';
      bmiStatusEl.innerText = '暂无数据';
      bmiStatusEl.className = 'text-sm font-bold mt-1 px-2.5 py-0.5 rounded-full bg-gray-50 text-gray-400';
    } else {
      const latestWeight = parseFloat(db.weights[0].value);
      const hm = h / 100;
      const bmi = (latestWeight / (hm * hm)).toFixed(1);
      
      let status = '', color = '', bgClass = '';
      if (bmi < 18.5) { status = '偏瘦'; color = 'text-blue-500'; bgClass='bg-blue-50'; }
      else if (bmi < 24) { status = '正常'; color = 'text-green-500'; bgClass='bg-green-50'; }
      else if (bmi < 28) { status = '偏胖'; color = 'text-yellow-500'; bgClass='bg-yellow-50'; }
      else { status = '肥胖'; color = 'text-red-500'; bgClass='bg-red-50'; }
      
      bmiValEl.innerText = bmi;
      bmiValEl.className = `text-4xl font-black tracking-tighter ${color}`;
      bmiStatusEl.innerText = status;
      bmiStatusEl.className = `text-sm font-bold mt-1 px-2.5 py-0.5 rounded-full ${bgClass} ${color}`;
    }
  }

  function handleSaveSetting(key, val) {
    if (val && parseFloat(val) > 0) {
      dbService.updateUser(key, parseFloat(val));
      showToast('设置已保存');
      renderProfile();
    }
  }
  
  heightInput.addEventListener('blur', (e) => handleSaveSetting('height', e.target.value));
  targetInput.addEventListener('blur', (e) => handleSaveSetting('targetWeight', e.target.value));

  document.getElementById('btn-clear-data').addEventListener('click', () => {
    showConfirm('危险操作', '确定要清空所有记录和设置吗？此操作不可逆！', () => {
      dbService.clearAll();
      showToast('数据已全部清空');
      refreshUI();
    });
  });

  /** --- FAB 拖拽 --- */
  const FAB_POS_KEY = 'diet_tracker_fab_v1';
  let isFabDragging = false;
  let fabStartX, fabStartY, fabInitRight, fabInitBottom;

  (function initFabDrag() {
    const fab = document.getElementById('btn-open-sport');

    try {
      const saved = localStorage.getItem(FAB_POS_KEY);
      if (saved) {
        const { right, bottom } = JSON.parse(saved);
        fab.style.right = right + 'px';
        fab.style.bottom = bottom + 'px';
      }
    } catch(e) {}

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function onStart(e) {
      isFabDragging = false;
      const p = e.touches ? e.touches[0] : e;
      fabStartX = p.clientX;
      fabStartY = p.clientY;
      const r = fab.getBoundingClientRect();
      fabInitRight = window.innerWidth - r.right;
      fabInitBottom = window.innerHeight - r.bottom;

      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
    }

    function onMove(e) {
      const p = e.touches ? e.touches[0] : e;
      const dx = p.clientX - fabStartX;
      const dy = p.clientY - fabStartY;

      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        if (!isFabDragging) isFabDragging = true;
      }
      if (!isFabDragging) return;
      e.preventDefault();

      const newRight = clamp(fabInitRight - dx, -30, window.innerWidth - 30);
      const newBottom = clamp(fabInitBottom - dy, 0, window.innerHeight - 30);
      fab.style.right = newRight + 'px';
      fab.style.bottom = newBottom + 'px';
    }

    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);

      if (isFabDragging) {
        localStorage.setItem(FAB_POS_KEY, JSON.stringify({
          right: Math.round(fabInitRight),
          bottom: Math.round(fabInitBottom)
        }));
      }
    }

    fab.addEventListener('touchstart', onStart, { passive: true });
    fab.addEventListener('mousedown', onStart);
  })();

  // Init APP
  renderHome();

</script>
